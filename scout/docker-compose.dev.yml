# SST Scout - Development / Test override
#
# テスト用フィクスチャ Steam ライブラリをマウントして pytest を実行します。
# ネットワーク外部依存なし (S3 接続は不要)。
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# 単体テストのみ実行 (コンテナ内 pytest):
#   docker compose -f docker-compose.dev.yml run --rm scout-test

services:
  scout-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sst-scout-test
    environment:
      - STEAM_LIBRARY_PATH=/steam_library
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_BUCKET=buckets
      - S3_ACCESS_KEY=
      - S3_SECRET_KEY=
      - DRY_RUN=true
      - LOG_LEVEL=DEBUG
      - PYTHONPATH=/app/src
    volumes:
      # テスト用フィクスチャ Steam ライブラリ (読み取り専用)
      - ./test/fixtures/steam_library:/steam_library:ro
      # ソースを直接マウントしてホット編集可能にする
      - ./src:/app/src:ro
      - ./test:/app/test:ro
    entrypoint: ["python", "-m", "pytest", "/app/test/", "-v", "--tb=short"]
    networks:
      - sst-dev-net
    restart: "no"

networks:
  sst-dev-net:
    driver: bridge

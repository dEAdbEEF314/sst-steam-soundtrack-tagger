# SST Scout - Production
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in STEAM_LIBRARY_PATH.
#   2. Ensure the external "sst-net" Docker network exists:
#        docker network create sst-net
#
# Run:
#   docker compose up --build

services:
  scout:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sst-scout
    env_file:
      - .env
    volumes:
      # STEAM_LIBRARY_PATH は .env で指定。
      # Docker Desktop for Windows の場合は Windows パス形式 (C:\...) でも動作します。
      # WSL2 / Linux の場合は /mnt/c/... 形式を使用してください。
      - ${STEAM_LIBRARY_PATH}:/steam_library:ro
    environment:
      - STEAM_LIBRARY_PATH=/steam_library
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-http://swfs-s3.outergods.lan}
      - S3_BUCKET=${S3_BUCKET:-buckets}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-}
      - DRY_RUN=${DRY_RUN:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - sst-net
    restart: "no"

networks:
  sst-net:
    name: sst-net
    external: true
